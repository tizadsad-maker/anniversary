<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำถามง่ายๆ</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="Background.css" rel="stylesheet">
  
  <style>
    /* ── Reset ── */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    /* ── จัดหน้าจอหลักให้อยู่กึ่งกลาง ── */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
    }

    /* ── กล่อง Card หลัก ── */
    .card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    /* ── หน้าแรก ── */
    #screen-intro h1 { 
      font-size: 28px; 
      color: #2d1a24; 
      margin-bottom: 8px; 
    }
    
    #screen-intro p { 
      font-size: 15px; 
      color: #9b7a88; 
      margin-bottom: 28px; 
    }

    /* ── หน้าคำถาม ── */
    .q-number { 
      font-size: 13px; 
      color: #e8547a; 
      font-weight: 600;
      letter-spacing: .08em; 
      margin-bottom: 12px; 
    }
    
    .q-emoji { 
      font-size: 44px; 
      margin-bottom: 14px; 
      display: block; 
    }
    
    .q-text { 
      font-size: 17px; 
      font-weight: 500; 
      color: #2d1a24;
      line-height: 1.55; 
      margin-bottom: 24px; 
    }

    .choices { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      margin-bottom: 16px; 
    }

    /* ── ปุ่มตัวเลือกพร้อม Transition เคลื่อนไหวนุ่มๆ ── */
    .choice {
      padding: 14px 18px;
      background: white;
      border: 1.5px solid #f7d6e3;
      border-radius: 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      color: #2d1a24;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s ease-out, box-shadow 0.2s;
      position: relative; 
    }

    /* ✨ Hover ปุ๊มเด้งดุ๊กดิ๊ก */
    .choice:not(:disabled):hover {
      background: #fce7ef;
      border-color: #e8547a;
      transform: translateY(-3px) scale(1.03); 
      box-shadow: 0 5px 15px rgba(232, 84, 122, 0.15); 
    }

    /* 🟢 สไตล์ตอนตอบถูก */
    .choice.correct { 
      background: #e8f5e9; 
      border-color: #4caf50; 
      color: #1b5e20; 
      transform: scale(1.05); 
    }

    /* 🔴 สไตล์ตอนตอบผิด */
    .choice.wrong { 
      background: #fce4ec; 
      border-color: #e91e63; 
      color: #880e4f; 
    }
    
    .choice:disabled { 
      cursor: default; 
    }
    
    .choice.wrong:hover { 
      transform: none; 
      box-shadow: none; 
    }

    /* ── แอนิเมชันตอนกดผิด (Shake) ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    
    .apply-shake {
      animation: shake 0.4s ease-in-out;
      border-color: #e91e63 !important; 
    }

    .feedback {
      font-size: 14px; 
      color: #9b7a88;
      line-height: 1.6; 
      min-height: 24px;
      margin-bottom: 16px;
    }

    .btn {
      display: block; 
      width: 100%; 
      padding: 14px;
      background: #e8547a; 
      color: white; 
      border: none;
      border-radius: 14px; 
      font-family: 'Sarabun', sans-serif;
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 8px;
    }
    
    .btn:active { 
      background: #c03060; 
    }

    .hidden { 
      display: none !important; 
    }

    /* ── 🖤 หน้าจอเซอร์ไพรส์สีดำเต็มจอ (ปุ่มหัวใจ) ── */
    #screen-surprise {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000000;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease-in-out;
    }
    
    #screen-surprise.active { 
      opacity: 1; 
      pointer-events: auto; 
    }

    .surprise-title {
      font-size: 26px; 
      font-weight: 500; 
      color: #ffffff; 
      margin-bottom: 36px;
      opacity: 0; 
      transform: translateY(20px);
      animation: fadeInUp 1.8s ease-out 0.8s forwards; 
      letter-spacing: 1px;
      transition: opacity 0.8s ease;
    }

    .circle-btn {
      width: 65px; 
      height: 65px; 
      background: #e8547a; 
      border: none; 
      border-radius: 50%;
      cursor: pointer; 
      opacity: 0; 
      transform: scale(0.7);
      animation: scaleIn 1.5s ease-out 2.2s forwards; 
      box-shadow: 0 0 20px rgba(232, 84, 122, 0.6);
      transition: transform 0.3s ease, background 0.3s, box-shadow 0.3s, opacity 0.8s ease;
      position: relative;
    }
    
    .circle-btn::after {
      content: '💗'; 
      font-size: 24px; 
      position: absolute;
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%);
    }
    
    .circle-btn:hover {
      background: #ff6b91; 
      transform: scale(1.15);
      box-shadow: 0 0 30px rgba(232, 84, 122, 0.9);
    }

    @keyframes fadeInUp { 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes scaleIn { 
      to { opacity: 1; transform: scale(1); } 
    }

    /* ── 🌸 หน้าสุดท้าย (พื้นหลัง + ข้อความ + เพลง) ── */
    #screen-ending {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 100000;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease-in-out;
    }
    
    #screen-ending.active { 
      opacity: 1; 
      pointer-events: auto; 
    }

    /* รูป slideshow แต่ละรูปซ้อนกัน เฟดสลับ */
    .slide-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }
    
    .slide-bg.visible { 
      opacity: 1; 
    }

    #bg-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* ส่วนระบบความโปร่งใสและแอนิเมชันให้ข้อความ */
    #ending-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 85%; 
      max-width: 600px;
      color: #ffffff;
      font-size: 24px; 
      font-weight: 500;
      text-align: center; 
      line-height: 1.9;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.9), 0 0 12px rgba(232, 84, 122, 0.4);
      z-index: 2;
      opacity: 0; 
      transition: opacity 1s ease-in-out;
    }
    
    /* คลาสสำหรับสั่งโชว์ข้อความให้เฟดขึ้นมา */
    #ending-text.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="screen-intro">
      <h1>วันครบรอบ</h1>
      <p>ไหนดูดิ๊รู้จักกันดีแค่ไหน</p>
      <button class="btn" onclick="startGame()">อยากลองแล้ว→</button>
    </div>

    <div id="screen-quiz" class="hidden">
      <div class="q-number" id="q-number">ข้อ 1 / 5</div>
      <span class="q-emoji" id="q-emoji">💭</span>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn hidden" id="btn-next" onclick="nextQuestion()">ถัดไป →</button>
    </div>
  </div>

  <div id="screen-surprise">
    <div class="surprise-title" id="text-ask">อยากไปต่อมั้ย</div>
    <button class="circle-btn" id="btn-heart" onclick="triggerSurprise()"></button>
  </div>

  <div id="screen-ending">
    <div id="bg-container"></div>
    <div id="bg-overlay"></div>
    <div id="ending-text"></div>
  </div>

  <script>
    // ══════════════════════════════
    //  คลังคำถามควิซความรัก (10 ข้อ)
    // ══════════════════════════════
    const questions = [
      {
        emoji: '💑',
        text: 'วันแรกที่ไปรับเธอเค้าใส่ชุดสีอะไร',
        choices: ['สีดำ', 'สีขาว', 'สีฟ้า', 'สีแดง'],
        correct: 0,
        feedback: '✅ จำได้ด้วยเหย๋ออเก่งมั๊กเลอออ'
      },
      {
        emoji: '🗓️',
        text: 'อีกกี่วันเราถึงจะเจอกัน',
        choices: ['14', '5', '2', '7'],
        correct: 3,
        feedback: '✅ เย้อ้วนเค้าเก่งจังเลยจำได้ด้วยย'
      },
      {
        emoji: '✈️🌍',
        text: 'ถ้ามีเงินไม่จำกัดที่ที่เราจะไปเที่ยวกันคือที่ไหน?',
        choices: ['เกาหลีเหนือ', 'ญี่ปุ่น', 'แอฟฟริกาใต้', 'ปารีส'],
        correct: 1,
        feedback: '✅ ไป ไปตอนนี้เลอ5555'
      },
      {
        emoji: '💬',
        text: 'ประโยคแรกที่เค้าทักหาเธอตั้งแต่วันแรกที่คุยกันคือ~~~',
        choices: ['อ้วนของเค้า', 'พี่สาวฉุดฉวย', 'พี่คนสวย', 'ทักคั้บ'],
        correct: 3,
        feedback: '✅ โครตเอ๋อคำทักแรกที่เค้าทักเธอ5555'
      },
      {
        emoji: '💍💗',
        text: 'เธอคือของใครกันน๊ะ?',
        choices: ['สุดหล่อจากเขมร', 'สุดหล่อบ้านรูหนูกินน้ำก๊อกเติ้ล', 'สุลต่านจากดูไบ', 'เทพพระบุตรขี่มังกร'],
        correct: 1,
        feedback: '✅ หึ้ยเก่งจังเลยไอดื้ออรู้ตัวเองด้วยว่าของใคร 💗'
      },
      {
        emoji: '😲🎁', 
        text: 'ครั้งแรกที่เค้าเซอร์ไพรสเธอเค้าทำอะไร',
        choices: ['กระโดดกัดคอเธอ', 'ยิ้มโรคจิตก่อนวิ่งสี่ขาใส่เธอในที่มืด', 'ไปรับเธอมานอนหอ', 'กระโดดกำแพงวัดโชว์เธอ'],
        correct: 2,
        feedback: '✅ ก็ลองตอบผิดข้อนี้ดูอ้วน'
      },
      {
        emoji: '🎬', 
        text: 'คืนแรกที่เราอยู่ด้วยกันเราดูหนังเรื่องอะไร',
        choices: ['พี่นาค', 'บาบี้', 'ทอยสตอรี่', 'บุพเพสันนิวาส'],
        correct: 2,
        feedback: '✅ ประเด็นคือดูไม่จบด้วยมีเด็กดื้ออ้อน'
      },
      {
        emoji: '😏', 
        text: 'วันแรกที่คบกันคือวันที่',
        choices: ['วันที่ 18 มกราคม', '15 พฤษภาคม', '5 มกราคม', '15 มิถุนายน'],
        correct: 1,
        feedback: '✅ จำผิดซวยนะว่านนะ'
      },
      {
        emoji: '😁', 
        text: 'ถ้าเจอกันเราจะได้ทำอะไร',
        choices: ['กินข้าว', 'ดีดลูกแก้ว', 'เล่นชักเย่อ', 'ผีผ้าห่มกับจูเนียร์'],
        correct: 0,
        feedback: '✅ รู้นะว่าจะกดผีผ้าห่มอะ อุบาด🤣🤣'
      },
      {
        emoji: '😁', 
        text: 'รักเติ้ลมั้ย',
        choices: ['ไม่ รักนะ', 'ไม่ โครตรักเลย', 'รัก', 'รักสุดๆ'],
        correct: 0,
        feedback: '✅ น่ารักจังเลยรักเติ้ล🤣🤣'
      }
    ];

    // ══════════════════════════════
    //  รายชื่อไฟล์รูปภาพทำสไลด์โชว์พื้นหลัง
    // ══════════════════════════════
    const myImages = [
      '1.png', '2.png', '3.png', '4.png', '5.png',
      '6.png', '7.png', '8.png', '9.png', '10.png',
      '11.png', '12.png', '13.png', '14.png', '15.png',
      '16.png', '17.png', '18.png', '19.png', '20.png'
    ];

    // ══════════════════════════════
    //  ตัวสร้างระบบเสียงเอฟเฟกต์และเพลงควิซ
    // ══════════════════════════════
    const bgMusic = new Audio('bgm.mp3');         
    bgMusic.loop = true;                          
    bgMusic.volume = 0.25;                        

    const catchSound = new Audio('catch.mp3');     
    const correctSound = new Audio('correct.mp3'); 
    const wrongSound = new Audio('wrong.mp3');
    
    const heartbeatSound = new Audio('heartbeat.mp3');
    heartbeatSound.loop = true;
    heartbeatSound.volume = 0.7;

    const loveMusic = new Audio('love.mp3');
    loveMusic.loop = false; // 🎵 ปิดระบบวนลูปเพื่อให้เล่นรอบเดียวจบตามต้องการ
    loveMusic.volume = 0; 

    // ══════════════════════════════
    //  💬 ระบบข้อความตอนจบ 5 ประโยค (ประโยคละ 12 วิ)
    // ══════════════════════════════
    const endingSentences = [
      "ฮั่นแน่กดมาแล้วเค้าไม่ให้เธอไปไหนแล้วนะ",   
      "ขอบคุณนะเธอขนาดนี้แค่เดือนเดียวเองแต่เจอกันสาหัสจัด",     
      "แต่เค้าไม่ให้ไปไหนแล้วนะเค้าจะกอดเธอให้แน่นเอาให้ไปไหนไม่ได้เลออ",     
      "ครบรอบ 1 เดือนแล้วเอาไปเท่านี้ก่อนมีเซอร์ไพรส์อีกชิ้นรออยู่วันที่ 22",     
      "รักเธอนะอ้วน💗"
    ];
    
    let currentSentenceIdx = 0;
    let slideIdx = 0;
    let slideTimer = null;
    let currentQ = 0;
    let score = 0;
    let answered = false;
    let wrongCount = 0;
    let correctClickCount = 0;

    // ══════════════════════════════
    //  ฟังก์ชันจัดการระบบสไลด์ภาพพื้นหลัง
    // ══════════════════════════════
    function startSlideshow() {
      const container = document.getElementById('bg-container');
      container.innerHTML = '';

      myImages.forEach(function(src, i) {
        const div = document.createElement('div');
        div.className = 'slide-bg' + (i === 0 ? ' visible' : '');
        div.style.backgroundImage = "url('" + src + "')";
        container.appendChild(div);
      });

      slideTimer = setInterval(function() {
        const slides = document.querySelectorAll('.slide-bg');
        if (slides.length <= 1) return;
        slides[slideIdx].classList.remove('visible');
        slideIdx = (slideIdx + 1) % slides.length;
        slides[slideIdx].classList.add('visible');
      }, 4000);
    }

    // ══════════════════════════════
    //  ฟังก์ชันแอนิเมชันลำดับข้อความบอกรักตอนท้าย
    // ══════════════════════════════
    function startEndingTextSequence() {
      const textElement = document.getElementById('ending-text');
      
      // เมื่อแสดงครบจนถึงประโยคสุดท้าย (ประโยคที่ 5) ให้รันการแสดงผลแล้วเฟดออกเหมือนข้อความอื่น
      if (currentSentenceIdx >= endingSentences.length) {
          return; // จบลำดับข้อความทั้งหมด ปล่อยให้พื้นหลังรันต่อจนเพลงจบ
      }

      // 1. เปลี่ยนข้อความเป็นประโยคปัจจุบัน
      textElement.innerHTML = endingSentences[currentSentenceIdx];
      
      // 2. เฟดข้อความเข้ามาให้เห็น
      textElement.classList.add('show');

      // 3. ตั้งเวลา 11 วินาที เพื่อเริ่มเฟดข้อความออก
      setTimeout(() => {
        textElement.classList.remove('show'); // เริ่มเฟดออก
        
        // 4. รอให้เฟดออกจนสนิท (1 วินาที) แล้วจัดการเงื่อนไขต่อไป
        setTimeout(() => {
          currentSentenceIdx++;
          startEndingTextSequence(); // เรียกตัวเองเพื่อแสดงประโยคถัดไป หรือปิดลูปเมื่อหมด
        }, 1000);
        
      }, 11000); // 11 วิ (แสดง) + 1 วิ (เฟดออก) = 12 วินาทีต่อ 1 รอบ
    }

    // ══════════════════════════════
    //  ฟังก์ชันแกนหลักควบคุมควิซและการเปลี่ยนผ่านหน้าจอ
    // ══════════════════════════════
    function startGame() {
      currentQ = 0;
      score = 0;
      
      document.getElementById('screen-surprise').classList.add('hidden');
      document.getElementById('screen-surprise').classList.remove('active');

      showScreen('quiz');
      loadQuestion();

      bgMusic.currentTime = 0;
      bgMusic.play().catch(e => console.log("BGM blocked"));
    }

    function loadQuestion() {
      answered = false;
      wrongCount = 0;
      correctClickCount = 0;
      
      const q = questions[currentQ];

      document.getElementById('q-number').textContent = `ข้อ ${currentQ + 1} / ${questions.length}`;
      document.getElementById('q-emoji').textContent = q.emoji;
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('feedback').textContent = '';
      document.getElementById('btn-next').classList.add('hidden');

      const box = document.getElementById('choices');
      box.innerHTML = '';  
      const letters = ['A', 'B', 'C', 'D'];

      q.choices.forEach(function(text, index) {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = letters[index] + '.  ' + text;
        btn.onclick = function() { pickAnswer(index); };
        box.appendChild(btn);
      });
    }

    function pickAnswer(index) {
      if (answered) return;

      const q = questions[currentQ];
      const buttons = document.querySelectorAll('.choice');

      if (index === q.correct) {
        correctClickCount++;

        if (correctClickCount <= 5) {
          catchSound.currentTime = 0;
          catchSound.play().catch(e => console.log("Audio error"));

          const targetBtn = buttons[index];
          const maxX = window.innerWidth - 160;
          const maxY = window.innerHeight - 80;
          const randomX = Math.max(10, Math.floor(Math.random() * maxX));
          const randomY = Math.max(10, Math.floor(Math.random() * maxY));

          targetBtn.style.position = 'fixed';
          targetBtn.style.left = randomX + 'px';
          targetBtn.style.top = randomY + 'px';
          targetBtn.style.zIndex = '9999';
          
          document.getElementById('feedback').textContent = 'จับให้ได้สิ้! 😜';
        } else {
          answered = true;
          correctSound.currentTime = 0;
          correctSound.play().catch(e => console.log("Audio error"));

          buttons.forEach(function(btn) { 
            btn.disabled = true;
            btn.style.position = '';
            btn.style.left = '';
            btn.style.top = '';
          });

          buttons[index].classList.add('correct');
          score++;
          document.getElementById('feedback').textContent = q.feedback;

          const nextBtn = document.getElementById('btn-next');
          nextBtn.classList.remove('hidden');
          nextBtn.textContent = currentQ < questions.length - 1 ? 'ถัดไป →' : 'ดูเซอร์ไพรส์ 💌';
        }

      } else {
        wrongCount++;
        const targetBtn = buttons[index];

        wrongSound.currentTime = 0;
        wrongSound.play().catch(e => console.log("Audio error"));

        targetBtn.classList.add('apply-shake');
        targetBtn.classList.add('wrong');

        targetBtn.addEventListener('animationend', () => {
            targetBtn.classList.remove('apply-shake');
        }, { once: true });
          
        if (wrongCount === 1) {
          document.getElementById('feedback').textContent = '❌ นึกดีๆก่อนอ้วนรีบอะเรา🥹';
        } else if (wrongCount === 2) { 
          document.getElementById('feedback').textContent = '❌ แหนะๆผิดอีกละ😡';
        } else {
          document.getElementById('feedback').textContent = '❌ หึ้ยจริงจังป่ะเนี้ย🤬';
        }
      }
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ < questions.length) {
        loadQuestion();
      } else {
        showSurpriseScreen();
      }
    }

    function showSurpriseScreen() {
      document.getElementById('screen-intro').classList.add('hidden');
      document.getElementById('screen-quiz').classList.add('hidden');

      let fadeOutInterval = setInterval(function() {
        if (bgMusic.volume > 0.02) {
          bgMusic.volume -= 0.02;
        } else {
          bgMusic.pause();
          bgMusic.volume = 0.25; 
          clearInterval(fadeOutInterval);
        }
      }, 100); 

      const surpriseScreen = document.getElementById('screen-surprise');
      surpriseScreen.classList.remove('hidden');
      
      setTimeout(function() {
        surpriseScreen.classList.add('active');
        heartbeatSound.currentTime = 0;
        heartbeatSound.play().catch(e => console.log("Heartbeat blocked"));
      }, 50);
    }

    function triggerSurprise() {
      heartbeatSound.pause();
      heartbeatSound.currentTime = 0;

      const surpriseScreen = document.getElementById('screen-surprise');
      surpriseScreen.style.transition = 'opacity 1s ease';
      surpriseScreen.style.opacity = '0';
      surpriseScreen.style.pointerEvents = 'none';

      setTimeout(function() {
        surpriseScreen.style.display = 'none';

        const ending = document.getElementById('screen-ending');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            ending.classList.add('active');
            startSlideshow(); 
            setTimeout(startEndingTextSequence, 1000); 
          });
        });

        // เล่นเพลงหลักตอนท้ายแบบไม่ลูป
        loveMusic.currentTime = 0;
        loveMusic.play().catch(e => console.log('love music blocked'));
        
        let fadeIn = setInterval(function() {
          if (loveMusic.volume < 0.23) {
            loveMusic.volume = Math.min(0.25, loveMusic.volume + 0.01);
          } else {
            loveMusic.volume = 0.25;
            clearInterval(fadeIn);
          }
        }, 80);

        // 🚨 ตรวจจับจังหวะเมื่อเพลงเล่นจบแทร็ก ให้เด้งออกจากหน้าเว็บไปยังหน้าว่างทันที
        loveMusic.onended = function() {
          window.location.href = "about:blank";
        };

      }, 1000);
    }

    function showScreen(name) {
      document.getElementById('screen-intro').classList.add('hidden');
      document.getElementById('screen-quiz').classList.add('hidden');
      document.getElementById('screen-' + name).classList.remove('hidden');
    }
  </script>
</body>
</html>
